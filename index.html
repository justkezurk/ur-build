<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>urbuild</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/pyodide/v0.26.1/full/pyodide.js"></script>
  <style>
    .file-slot { transition: all 0.2s; }
    .file-slot:focus-within { border-color: #22c55e; box-shadow: 0 0 0 3px #22c55e33; }
    .glass { background: rgba(255,255,255,0.05); backdrop-filter: blur(12px); }
    .logo { font-family: system-ui; font-weight: 800; letter-spacing: -2px; }
    .bubble {
      animation: float 3s ease-in-out infinite;
      box-shadow: 0 0 20px rgba(16, 185, 129, 0.5);
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
    .iridescent {
      background: linear-gradient(45deg, #10b981, #8b5cf6, #ec4899, #10b981);
      background-size: 300% 300%;
      animation: iridescent 4s ease infinite;
    }
    @keyframes iridescent {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* Nexus Panel Styles for 1.1 */
    #nexus-panel {
      transition: width 0.1s ease;
      min-width: 280px;
      max-width: 520px;
    }
    .nexus-resize-handle {
      position: absolute;
      left: -4px;
      top: 0;
      bottom: 0;
      width: 8px;
      cursor: ew-resize;
      z-index: 10;
    }
    .nexus-box {
      background: #18181b;
      border: 1px solid #3f3f46;
      border-radius: 12px;
      margin-bottom: 12px;
      overflow: hidden;
    }
    .nexus-box-header {
      background: #27272a;
      padding: 8px 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.875rem;
    }
  </style>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen flex flex-col">
  <div class="flex h-screen">
    <!-- Sidebar -->
    <div class="w-72 bg-zinc-900 border-r border-zinc-800 flex flex-col">
      <div class="p-6 border-b border-zinc-800 flex items-center justify-between">
        <div class="flex items-center gap-3">
          <div class="w-11 h-11 iridescent rounded-2xl flex items-center justify-center bubble">
            <span class="text-white text-3xl font-black tracking-tighter">u</span>
          </div>
          <div>
            <h1 class="text-3xl font-black tracking-tighter logo">urbuild</h1>
            <p class="text-[10px] text-emerald-400 -mt-1">browser dev lab</p>
          </div>
        </div>
        <button onclick="openSettings()" class="text-zinc-400 hover:text-white p-2">
          <i class="fas fa-cog text-lg"></i>
        </button>
      </div>

      <div class="p-4 space-y-2">
        <button onclick="newProject()" class="w-full bg-emerald-600 hover:bg-emerald-500 px-4 py-3 rounded-xl flex items-center justify-center gap-2">
          <i class="fas fa-plus"></i> New Project
        </button>
        <div class="flex gap-2">
          <button onclick="exportProject()" class="flex-1 bg-zinc-800 hover:bg-zinc-700 px-3 py-2 rounded-xl text-sm flex items-center justify-center gap-2">
            <i class="fas fa-download"></i> Export
          </button>
          <button onclick="importProject()" class="flex-1 bg-zinc-800 hover:bg-zinc-700 px-3 py-2 rounded-xl text-sm flex items-center justify-center gap-2">
            <i class="fas fa-upload"></i> Import
          </button>
        </div>
      </div>

      <div class="px-6 text-xs uppercase tracking-widest text-zinc-400 mb-2">Saved Projects</div>
      <div id="saved-list" class="flex-1 overflow-auto px-2"></div>
    </div>

    <!-- Main -->
    <div class="flex-1 flex flex-col">
      <div class="h-16 bg-zinc-900 border-b border-zinc-800 flex items-center px-6 gap-6">
        <select id="template-select" onchange="loadTemplate()" class="bg-zinc-800 border border-zinc-700 rounded-lg px-4 py-2 text-sm">
          <option value="html">HTML + CSS</option>
          <option value="react">React / TSX</option>
          <option value="python">Python</option>
        </select>

        <div class="relative">
          <button onclick="toggleNexus()" class="px-5 py-2 bg-violet-600 hover:bg-violet-500 rounded-xl flex items-center gap-2">
            <i class="fas fa-project-diagram"></i> Networked Creation
          </button>
        </div>

        <button onclick="saveProject()" class="px-5 py-2 bg-zinc-800 hover:bg-zinc-700 rounded-xl">Save</button>
        <button onclick="runProject()" class="px-5 py-2 bg-emerald-600 hover:bg-emerald-500 rounded-xl">Run Live</button>

        <div class="ml-auto flex items-center gap-2 text-xs text-emerald-400">
          <i class="fas fa-circle animate-pulse"></i> Runs 100% on your device
        </div>
      </div>

      <div class="flex flex-1 overflow-hidden">
        <!-- Slots + Tree Importer -->
        <div class="w-96 bg-zinc-900 border-r border-zinc-800 p-6 overflow-auto flex flex-col">
          <div class="mb-4">
            <div class="flex items-center justify-between mb-2">
              <h2 class="uppercase text-xs tracking-widest text-zinc-400">File Tree Importer</h2>
              <button onclick="importFileTree()" class="text-xs bg-emerald-600 hover:bg-emerald-500 px-3 py-1 rounded-lg">Import</button>
            </div>
            <textarea id="tree-input" class="w-full h-40 bg-zinc-950 border border-zinc-700 rounded-2xl p-3 font-mono text-xs resize-y" placeholder="Paste file tree here...
project/
├── src/
│   ├── App.tsx
│   └── styles.css
└── package.json"></textarea>
          </div>

          <h2 class="uppercase text-xs tracking-widest text-zinc-400 mb-4">Copy from AI → Paste into boxes</h2>
          <div id="file-slots" class="space-y-6 flex-1"></div>
        </div>

        <!-- Preview -->
        <div class="flex-1 flex flex-col">
          <div class="bg-zinc-800 px-6 py-3 text-xs flex justify-between items-center border-b border-zinc-700">
            <span>Live Preview</span>
            <div class="flex gap-4">
              <button onclick="isolatePreview()" class="flex items-center gap-1 hover:text-white">
                <i class="fas fa-external-link-alt"></i> Pop-out
              </button>
            </div>
          </div>
          <iframe id="preview-frame" class="flex-1 border-0 bg-white"></iframe>
          <div id="python-console" class="hidden h-64 bg-black text-green-400 font-mono p-4 overflow-auto text-sm"></div>
        </div>

        <!-- Nexus Panel (replaces old AI panel) -->
        <div id="nexus-panel" class="w-96 bg-zinc-900 border-l border-zinc-800 flex flex-col hidden relative" style="width: 380px;">
          <!-- Resize Handle -->
          <div class="nexus-resize-handle" onmousedown="startNexusResize(event)"></div>

          <div class="p-4 border-b border-zinc-800 flex justify-between items-center">
            <div class="flex items-center gap-2">
              <h2 class="font-medium">Networked Creation</h2>
            </div>
            <div class="flex items-center gap-2">
              <button onclick="minimizeNexus()" class="text-zinc-400 hover:text-white px-2" title="Collapse panel">−</button>
              <button onclick="toggleNexus()" class="text-zinc-400 hover:text-white">✕</button>
            </div>
          </div>

          <!-- Stacking Container for boxes -->
          <div id="nexus-boxes" class="flex-1 p-4 overflow-auto flex flex-col">
            <!-- Default single chat box will be injected here by JS -->
          </div>

          <!-- Persistent + button at bottom -->
          <div class="p-4 border-t border-zinc-800">
            <button onclick="showNexusSpawnMenu()" class="w-full bg-emerald-600 hover:bg-emerald-500 py-2.5 rounded-xl flex items-center justify-center gap-2">
              <i class="fas fa-plus"></i> Add Cell
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Settings Modal (unchanged) -->
  <div id="settings-modal" class="hidden fixed inset-0 bg-black bg-opacity-70 flex items-center justify-center z-50">
    <div class="glass w-full max-w-2xl mx-4 rounded-3xl border border-zinc-700 overflow-hidden">
      <div class="p-6 border-b border-zinc-700 flex justify-between items-center">
        <h2 class="text-xl font-semibold">Settings & AI Providers</h2>
        <button onclick="closeSettings()" class="text-zinc-400 hover:text-white text-2xl">&times;</button>
      </div>

      <div class="p-6 space-y-6">
        <div>
          <label class="block text-sm text-zinc-400 mb-2">Master Passphrase</label>
          <div class="flex gap-2">
            <input id="master-passphrase" type="password" placeholder="Enter strong passphrase" class="flex-1 bg-zinc-800 border border-zinc-700 rounded-xl px-4 py-3">
            <button onclick="setMasterPassphrase()" class="px-6 bg-emerald-600 hover:bg-emerald-500 rounded-xl">Set</button>
          </div>
        </div>

        <div class="border border-zinc-700 rounded-2xl p-4">
          <h3 class="font-medium mb-3">Quick Add Popular Providers</h3>
          <div class="flex flex-wrap gap-2">
            <button onclick="addDefaultProvider('grok')" class="px-4 py-1.5 bg-zinc-800 hover:bg-zinc-700 rounded-xl text-sm flex items-center gap-2"><i class="fab fa-x-twitter"></i> Grok</button>
            <button onclick="addDefaultProvider('claude')" class="px-4 py-1.5 bg-zinc-800 hover:bg-zinc-700 rounded-xl text-sm flex items-center gap-2"><i class="fas fa-robot"></i> Claude</button>
            <button onclick="addDefaultProvider('gemini')" class="px-4 py-1.5 bg-zinc-800 hover:bg-zinc-700 rounded-xl text-sm flex items-center gap-2"><i class="fab fa-google"></i> Gemini</button>
            <button onclick="addDefaultProvider('openai')" class="px-4 py-1.5 bg-zinc-800 hover:bg-zinc-700 rounded-xl text-sm flex items-center gap-2"><i class="fas fa-brain"></i> OpenAI</button>
          </div>
        </div>

        <div class="border border-zinc-700 rounded-2xl p-4">
          <h3 class="font-medium mb-3">Add Custom Provider</h3>
          <div class="grid grid-cols-2 gap-3">
            <input id="new-name" placeholder="Name" class="bg-zinc-800 border border-zinc-700 rounded-xl px-4 py-2 text-sm">
            <input id="new-baseurl" placeholder="Base URL" value="https://api.openai.com/v1" class="bg-zinc-800 border border-zinc-700 rounded-xl px-4 py-2 text-sm">
            <input id="new-apikey" type="password" placeholder="API Key" class="bg-zinc-800 border border-zinc-700 rounded-xl px-4 py-2 text-sm col-span-2">
            <input id="new-model" placeholder="Model" value="gpt-4o" class="bg-zinc-800 border border-zinc-700 rounded-xl px-4 py-2 text-sm col-span-2">
          </div>
          <button onclick="addProvider()" class="mt-3 w-full bg-violet-600 hover:bg-violet-500 py-2.5 rounded-xl text-sm">Add Provider</button>
        </div>

        <div>
          <h3 class="font-medium mb-3">Your Providers</h3>
          <div id="providers-list" class="space-y-2 max-h-64 overflow-auto"></div>
        </div>
      </div>

      <div class="p-6 border-t border-zinc-700 flex justify-end">
        <button onclick="closeSettings()" class="px-6 py-2 bg-zinc-800 hover:bg-zinc-700 rounded-xl">Done</button>
      </div>
    </div>
  </div>

  <script>
    let masterKey = null;
    let currentProject = { name: "Untitled", template: "html", files: {} };
    let providers = [];
    let currentProviderId = null;
    let pyodideInstance = null;
    let containerCounter = 0;
    let nexusResizeData = null;

    const defaultTemplates = {
      html: { "index.html": `<h1 class="text-6xl font-bold text-center mt-40">urbuild</h1>`, "styles.css": `body { background:#09090b; color:white; font-family:system-ui; }` },
      react: { "main.tsx": `function App() { return <h1 class="text-5xl p-8">Hello from urbuild</h1>; } export default App;`, "styles.css": `` },
      python: { "main.py": `print("Hello from Python in urbuild")` }
    };

    // ... (keep all existing functions unchanged: saveEncryptedData, loadEncryptedData, deriveKey, etc. up to toggleAIChat) ...

    function toggleNexus() {
      const panel = document.getElementById('nexus-panel');
      panel.classList.toggle('hidden');
      if (!panel.classList.contains('hidden')) {
        initNexusPanel();
      }
    }

    function minimizeNexus() {
      const panel = document.getElementById('nexus-panel');
      panel.style.width = panel.style.width === '0px' ? '380px' : '0px';
      panel.style.overflow = panel.style.width === '0px' ? 'hidden' : 'visible';
    }

    function initNexusPanel() {
      const boxesContainer = document.getElementById('nexus-boxes');
      if (boxesContainer.children.length === 0) {
        // Create default chat box (preserves old behavior)
        const defaultBox = createNexusBox('AI Chat', true);
        boxesContainer.appendChild(defaultBox);
      }
    }

    function createNexusBox(title, isDefaultChat = false) {
      const box = document.createElement('div');
      box.className = 'nexus-box flex flex-col';

      box.innerHTML = `
        <div class="nexus-box-header">
          <span>${title}</span>
          <div class="flex gap-1">
            <button class="text-zinc-400 hover:text-white px-1" onclick="this.closest('.nexus-box').style.display='none'">−</button>
            <button class="text-zinc-400 hover:text-red-400 px-1" onclick="this.closest('.nexus-box').remove()">×</button>
          </div>
        </div>
        <div class="p-3 flex-1">
          ${isDefaultChat ? `
            <div id="nexus-default-chat" class="flex flex-col h-full">
              <div class="flex-1 overflow-auto text-sm" id="nexus-chat-messages"></div>
              <div class="mt-2 flex gap-2">
                <input placeholder="Message..." class="flex-1 bg-zinc-800 border border-zinc-700 rounded-xl px-3 py-2 text-sm" onkeydown="if(event.key==='Enter') sendNexusMessage(this)">
                <button onclick="sendNexusMessage(this.previousElementSibling)" class="px-4 bg-violet-600 hover:bg-violet-500 rounded-xl">Send</button>
              </div>
            </div>
          ` : `<div class="text-xs text-zinc-500 p-2">New cell ready. (Future: content here)</div>`}
        </div>
      `;
      return box;
    }

    function showNexusSpawnMenu() {
      const menu = document.createElement('div');
      menu.className = 'absolute bottom-16 right-4 w-56 bg-zinc-900 border border-zinc-700 rounded-xl shadow-xl py-1 z-[9999]';
      menu.innerHTML = `
        <div onclick="spawnNexusCell('ai')" class="px-4 py-2.5 hover:bg-zinc-800 cursor-pointer flex items-center gap-3"><i class="fas fa-robot"></i> AI Cell</div>
        <div onclick="spawnNexusCell('notebook')" class="px-4 py-2.5 hover:bg-zinc-800 cursor-pointer flex items-center gap-3"><i class="fas fa-book"></i> Notebook / Molab Cell</div>
        <div onclick="spawnNexusCell('collab')" class="px-4 py-2.5 hover:bg-zinc-800 cursor-pointer flex items-center gap-3"><i class="fas fa-users"></i> Collab / Team Cell</div>
        <div onclick="spawnNexusCell('api')" class="px-4 py-2.5 hover:bg-zinc-800 cursor-pointer flex items-center gap-3"><i class="fas fa-plug"></i> API Cell</div>
        <div class="border-t border-zinc-700 my-1"></div>
        <div onclick="spawnNexusCell('custom')" class="px-4 py-2.5 hover:bg-zinc-800 cursor-pointer text-emerald-400">+ Custom (coming soon)</div>
      `;

      // Position relative to the + button
      const plusBtn = event.currentTarget;
      document.body.appendChild(menu);

      // Close on outside click
      setTimeout(() => {
        document.addEventListener('click', function handler(e) {
          if (!menu.contains(e.target)) {
            menu.remove();
            document.removeEventListener('click', handler);
          }
        }, { once: true });
      }, 10);
    }

    function spawnNexusCell(type) {
      const container = document.getElementById('nexus-boxes');
      let title = 'New Cell';
      if (type === 'ai') title = 'AI Cell';
      if (type === 'notebook') title = 'Notebook Cell';
      if (type === 'collab') title = 'Collab Cell';
      if (type === 'api') title = 'API Cell';

      const box = createNexusBox(title);
      container.appendChild(box);
      container.scrollTop = container.scrollHeight;

      // Close any open menu
      document.querySelectorAll('.absolute.bottom-16').forEach(el => el.remove());
    }

    // Basic Nexus chat (placeholder for default box)
    function sendNexusMessage(input) {
      if (!input || !input.value.trim()) return;
      const messagesDiv = document.getElementById('nexus-chat-messages');
      if (!messagesDiv) return;

      const msg = document.createElement('div');
      msg.className = 'mb-2 text-sm';
      msg.innerHTML = `<span class="text-emerald-400">You:</span> ${input.value}`;
      messagesDiv.appendChild(msg);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
      input.value = '';

      // Placeholder AI reply
      setTimeout(() => {
        const reply = document.createElement('div');
        reply.className = 'mb-2 text-sm text-zinc-400';
        reply.textContent = 'Nexus: Got it. (Full AI integration coming in next phase)';
        messagesDiv.appendChild(reply);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
      }, 600);
    }

    // Resize logic for Nexus panel
    function startNexusResize(e) {
      const panel = document.getElementById('nexus-panel');
      nexusResizeData = {
        startX: e.clientX,
        startWidth: panel.offsetWidth
      };
      document.addEventListener('mousemove', doNexusResize);
      document.addEventListener('mouseup', stopNexusResize);
    }

    function doNexusResize(e) {
      if (!nexusResizeData) return;
      const panel = document.getElementById('nexus-panel');
      const newWidth = nexusResizeData.startWidth + (e.clientX - nexusResizeData.startX);
      panel.style.width = Math.max(280, Math.min(520, newWidth)) + 'px';
    }

    function stopNexusResize() {
      document.removeEventListener('mousemove', doNexusResize);
      document.removeEventListener('mouseup', stopNexusResize);
      nexusResizeData = null;
      // Save preference
      localStorage.setItem('nexusPanelWidth', document.getElementById('nexus-panel').style.width);
    }

    // Restore saved width on load
    function restoreNexusWidth() {
      const saved = localStorage.getItem('nexusPanelWidth');
      if (saved) {
        const panel = document.getElementById('nexus-panel');
        if (panel) panel.style.width = saved;
      }
    }

    // ... (keep all other existing functions: createSlot, refreshSlots, loadTemplate, runProject, etc.)

    window.onload = async () => {
      newProject();
      renderSavedList();
      restoreNexusWidth();

      const stored = localStorage.getItem('urspace_encrypted');
      if (stored) {
        const pass = prompt("Enter your master passphrase to unlock AI providers");
        if (pass) {
          masterKey = await deriveKey(pass);
          await loadEncryptedData();
          updateProviderSelect();
        }
      }
    };
  </script>
</body>
</html>
