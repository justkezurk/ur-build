<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grok Proxy</title>
  <style>
    body, html { margin:0; padding:0; height:100%; overflow:hidden; }
    iframe { width:100%; height:100%; border:none; }
  </style>
</head>
<body>
  <iframe id="grok-frame" src="https://grok.com/chat" sandbox="allow-scripts allow-same-origin allow-popups allow-forms"></iframe>
  <script>
    const frame = document.getElementById('grok-frame');
    // Basic postMessage relay for future use
    window.addEventListener('message', (event) => {
      if (event.data && event.data.type === 'to-grok') {
        // Could forward if possible, but direct DOM hard
        console.log('Parent message to Grok:', event.data);
      }
    });
    // Forward iframe messages to parent if needed
    frame.addEventListener('load', () => {
      console.log('Grok container loaded');
    });
  </script>
</body>
</html>
